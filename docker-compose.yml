services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override so the app reaches Ollama via Docker network, not localhost
      NUXT_OPENAI_BASE_URL: http://ollama:11434/v1
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_data:
